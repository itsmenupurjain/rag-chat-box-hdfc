name: daily-refresh

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.1.7
      - name: checkout
        uses: actions/checkout@692973e3d937129bcbf406528e2398d16f49ca8f

      # actions/setup-python@v5.1.0
      - name: setup-python
        uses: actions/setup-python@f67e24827f573f74e304f14969228465eb99795b
        with:
          python-version: '3.10'

      - name: install
        run: pip install requests beautifulsoup4 numpy scikit-learn python-dotenv groq pandas

      - name: run-scripts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: .
        run: |
          python -m src.data_ingestion
          python -m src.index_data

      - name: push-changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-refresh data" || exit 0
          git push
